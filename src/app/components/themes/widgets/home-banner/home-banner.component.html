<!-- ============================================================
  Paris Theme — Nykaa × Tata Cliq Premium Hero Banner
  Layout: 1 large main banner (left) + 2 stacked sub-banners (right)
  No carousel. White, clean, premium.
============================================================ -->
<div class="nf-hero-section container-fluid-lg" *ngIf="theme && theme == 'paris'">
  <div class="nf-hero-grid">

    <!-- Main Banner -->
    <div class="nf-main-col" *ngIf="data?.main_banner?.image_url">
      <div class="nf-card nf-card--main ratio_65 skeleton-banner-xl">
        <div class="skeleton-text-wrap">
          <span class="placeholder col-7"></span>
          <span class="placeholder col-5"></span>
          <span class="placeholder col-4"></span>
          <span class="placeholder col-6"></span>
        </div>
        <app-image-link class="b-cl" [image]="data?.main_banner" [bgImage]="true"></app-image-link>
        <div class="nf-card__hover-label">
          <span>Shop Now</span>
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>
    </div>

    <!-- Sub Banners (stacked) -->
    <div class="nf-sub-col" *ngIf="data?.sub_banner_1?.image_url || data?.sub_banner_2?.image_url">

      <div class="nf-card nf-card--sub ratio_65 skeleton-banner-sm" *ngIf="data?.sub_banner_1?.image_url">
        <div class="skeleton-text-wrap">
          <span class="placeholder col-7"></span>
          <span class="placeholder col-5"></span>
        </div>
        <app-image-link class="b-cl" [image]="data?.sub_banner_1" [bgImage]="true"></app-image-link>
        <div class="nf-card__hover-label">
          <span>Explore</span>
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>

      <div class="nf-card nf-card--sub ratio_65 skeleton-banner-sm" *ngIf="data?.sub_banner_2?.image_url">
        <div class="skeleton-text-wrap">
          <span class="placeholder col-7"></span>
          <span class="placeholder col-5"></span>
        </div>
        <app-image-link class="b-cl" [image]="data?.sub_banner_2" [bgImage]="true"></app-image-link>
        <div class="nf-card__hover-label">
          <span>Explore</span>
          <i class="ri-arrow-right-long-line"></i>
        </div>
      </div>

    </div>
  </div>
</div>
